<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="./style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet"><title>img2ascii</title>
</head>
<body>
	<div class="container">
		<div class="window">
			<label class="input_file" id="imgDropZone">
				Drop an image, or click to upload
				<input type="file" id="imgInput">
			</label>
			<form class="input">
				<input type="text" id="gradient" spellcheck="false" placeholder="" />
				<div>
					<input type="radio" name="mode" value="mean" />
				</div>
				<div>
					<input type="checkbox" name="gradient" />
					<input type="checkbox" name="outline" />
				</div>
				<div class="input__submit">
					<input type="submit" />
				</div>

			</form>
			<div class="output">
				<canvas id="preview"></canvas>
				<p id="txtOutput"></p>
			</div>
		</div>
	</div>
	<script src="./formatpixels.js"></script>
	<script src="./script.js"></script>
</body>
</html>
