<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="./style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet"><title>img2ascii</title>
</head>
<body>
	<div class="container">
		<div class="window">
			<label class="input_file" id="imgDropZone">
				Drop an image, or click to upload
				<input type="file" id="imgInput">
			</label>
			<form class="input">
				<div>
					<h3>Shading gradient</h3>
					<input type="text" id="gradient" spellcheck="false" placeholder="" />
				</div>
				<div>
					<h3>Downscale factor</h3>
					<p>CAREFUL, setting it to a low value is not recomended, as it might cause significant lag. Should be kept at 7 or above for HD images and higher for greater resolution</p>
					<input type="range" step="1" id="scale" value="scale" min="1" max="50" />
				</div>
				<div>
					<h3>Processing algorithm</h3>
					<span>
						<input type="radio" name="mode" value="mean" id="meanmode" checked/>
						<label for="meanmode" class="checkbox">Mean</label>
					</span>
						
				</div>
				<div>
					<h3>Shading/outline</h3>
					<span>
						<input type="checkbox" name="gradient" id="gradientmode"checked/>
						<label for="gradientmode" class="checkbox">Gradient</label>
					</span>
					<span>
						<input type="checkbox" name="outline" id="outlinemode" />
						<label for="outlinemode" class="checkbox">Outline</label>
					</span>
				</div>
					<label class="input__submit">
						GENERATE
						<input type="submit" />
					</label>

			</form>
			<div class="output">
				<canvas id="preview"></canvas>
				<p id="txtOutput"></p>
			</div>
		</div>
	</div>
	<script src="./formatpixels.js"></script>
	<script src="./script.js"></script>
</body>
</html>
